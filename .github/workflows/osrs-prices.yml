name: Merge OSRS Prices

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

jobs:
  merge:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download JSON files
        run: |
          curl -o prices.json https://prices.runescape.wiki/api/v1/osrs/5m
          curl -o mapping.json https://prices.runescape.wiki/api/v1/osrs/mapping

      - name: Merge and filter
        run: |
          jq -n \
            --slurpfile prices prices.json \
            --slurpfile mapping mapping.json '

            ($prices[0].data) as $p |

            $mapping[0]
            | map(
                ($p[(.id|tostring)]) as $price
                | select($price != null)

                # wymagane dane
                | select($price.avgHighPrice != null)
                | select($price.avgLowPrice != null)
                | select($price.highPriceVolume > 0)
                | select($price.lowPriceVolume > 0)

                # margin
                ($price.avgHighPrice * 0.97 - $price.avgLowPrice) as $margin

                # wybór mniejszego wolumenu (realny flow rynku)
                (
                  if $price.highPriceVolume > $price.lowPriceVolume
                  then $price.lowPriceVolume
                  else $price.highPriceVolume
                  end
                ) as $vol

                # LIMIT DOTYCZY TYLKO VOLUME
                ($vol, .limit | min) as $realVol

                # profit
                ($margin * $realVol) as $profit

                # filtr
                | select($profit > 10000)

                # wynik
                | {
                    id,
                    limit,
                    name,
                    avgHighPrice: $price.avgHighPrice,
                    avgLowPrice: $price.avgLowPrice,
                    highPriceVolume: $price.highPriceVolume,
                    lowPriceVolume: $price.lowPriceVolume,
                    profit: $profit
                  }
              )

          ' > merged.json

      - name: Show merged file
        run: cat merged.json

      - name: Commit merged file
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add merged.json

          git diff --cached --quiet || (
            git commit -m "Update merged OSRS data"
            git push
          )
