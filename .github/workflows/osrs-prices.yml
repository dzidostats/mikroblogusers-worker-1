name: Merge OSRS Prices

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

jobs:
  merge:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download JSON files
        run: |
          curl -o prices.json https://prices.runescape.wiki/api/v1/osrs/5m
          curl -o mapping.json https://prices.runescape.wiki/api/v1/osrs/mapping

      - name: Merge and filter by conditions
        run: |
          jq -n \
            --slurpfile prices prices.json \
            --slurpfile mapping mapping.json '

            ($prices[0].data) as $p |

            $mapping[0]
            | map(
                ($p[(.id|tostring)]) as $price
                | select($price != null)

                # wymagane dane
                | select($price.avgHighPrice != null)
                | select($price.avgLowPrice != null)

                # podstawowe warunki
                | select(($price.avgHighPrice * 0.97) > $price.avgLowPrice)
                | select($price.highPriceVolume > 100)
                | select($price.lowPriceVolume > 100)

                # warunek zysku zależny od mniejszego volume
                | select(
                    (
                      (
                        ($price.avgHighPrice * 0.97)
                        - $price.avgLowPrice
                      )
                      *
                      (
                        if $price.highPriceVolume > $price.lowPriceVolume
                        then $price.lowPriceVolume
                        else $price.highPriceVolume
                        end
                      )
                    ) > 10000
                  )

                # wynik końcowy
                | {
                    id,
                    limit,
                    name
                  } + $price
              )

          ' > merged.json

      - name: Show merged file
        run: cat merged.json

      - name: Commit merged file
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add merged.json

          git diff --cached --quiet || (
            git commit -m "Update merged OSRS data"
            git push
          )
