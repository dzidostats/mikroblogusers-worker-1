name: OSRS Hourly Snapshot

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  snapshot:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download data
        run: |
          curl -s -o prices.json https://prices.runescape.wiki/api/v1/osrs/1h
          curl -s -o mapping.json https://prices.runescape.wiki/api/v1/osrs/mapping

      - name: Merge data
        run: |
          jq -n \
            --slurpfile prices prices.json \
            --slurpfile mapping mapping.json '

            ($prices[0].data) as $p |

            $mapping[0]
            | map(
                ($p[(.id|tostring)]) as $price
                | select($price != null)

                # SAFE CHECKS (fix crash)
                | select($price.avgHighPrice != null)
                | select($price.avgLowPrice != null)
                | select($price.highPriceVolume != null)
                | select($price.lowPriceVolume != null)
                | select(.limit != null)

                # margin
                | (($price.avgHighPrice * 0.97) - $price.avgLowPrice) as $margin

                # wybór mniejszego wolumenu
                | (
                    if $price.highPriceVolume > $price.lowPriceVolume
                    then $price.lowPriceVolume
                    else $price.highPriceVolume
                  end
                ) as $vol

                # limit tylko na volume
                | ([ $vol, .limit ] | min) as $realVol

                # profit
                | ($margin * $realVol) as $profit

                # filtr
                | select($profit > 10000)

                # output
                | {
                    timestamp: (now|floor),
                    id,
                    name,
                    profit,
                    avgHighPrice: $price.avgHighPrice,
                    avgLowPrice: $price.avgLowPrice
                  }
              )

          ' > result.json

      - name: Save hourly file
        run: |
          DATE=$(date -u +%F)
          HOUR=$(date -u +%H)

          mkdir -p data/$DATE
          mv result.json data/$DATE/$HOUR.json

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/

          git diff --cached --quiet || (
            git commit -m "Hourly OSRS snapshot"
            git push
          )
